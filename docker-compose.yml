services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # Ejecutar como root: el backend necesita acceso al socket de Docker
    # que en el host pertenece al grupo docker (GID variable por distro).
    # Como la herramienta ya tiene acceso root-equivalente via Docker socket,
    # no hay pérdida de seguridad real corriendo el proceso como root.
    user: "0"
    environment:
      - PORT=8080
      - DATABASE_PATH=/data/cloudcontrol.db
      - DOCKER_HOST=unix:///var/run/docker.sock
      - PROJECTS_DIR=/opt/cloudcontrol/projects
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - GIN_MODE=release
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - backend_data:/data
      - /opt/cloudcontrol/projects:/opt/cloudcontrol/projects
    networks:
      - internal
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cloudcontrol-admin.rule=Host(`${ADMIN_DOMAIN:-vertex.cloudcontrol.cl}`)"
      - "traefik.http.routers.cloudcontrol-admin.entrypoints=websecure"
      - "traefik.http.routers.cloudcontrol-admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.cloudcontrol-admin.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    networks:
      - internal
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama

networks:
  internal:
    driver: bridge
  traefik-public:
    external: true

volumes:
  backend_data:
  ollama_data:
