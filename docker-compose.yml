services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # Ejecutar como root: el backend necesita acceso al socket de Docker
    # que en el host pertenece al grupo docker (GID variable por distro).
    # Como la herramienta ya tiene acceso root-equivalente via Docker socket,
    # no hay pérdida de seguridad real corriendo el proceso como root.
    user: "0"
    environment:
      - PORT=8080
      - DATABASE_PATH=/data/cloudcontrol.db
      - DOCKER_HOST=unix:///var/run/docker.sock
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - GIN_MODE=release
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - backend_data:/data
      - backend_projects:/app/projects
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  backend_data:
  backend_projects:
