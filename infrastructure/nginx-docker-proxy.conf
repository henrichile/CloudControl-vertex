events { worker_connections 256; }

http {
    upstream dockerd {
        server unix:/var/run/docker.sock;
    }

    server {
        listen 2375;

        # Reescribir cualquier /v<N>.<M>/ a /v1.45/ antes de pasar al daemon.
        # El daemon de AlmaLinux 10 (Docker 28+) rechaza versiones < 1.40.
        location ~ ^/v[0-9]+\.[0-9]+/(.+)$ {
            proxy_pass         http://dockerd/v1.45/$1$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $http_connection;
            proxy_read_timeout 600s;
            proxy_buffering    off;
        }

        location / {
            proxy_pass         http://dockerd;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $http_connection;
            proxy_read_timeout 600s;
            proxy_buffering    off;
        }
    }
}
